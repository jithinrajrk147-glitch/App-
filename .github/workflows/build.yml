name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Download latest app zip
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/app-version.json https://jithinrajrk147-glitch.github.io/Anxro/app-version.json
          VERSION=$(grep -o '"version":[0-9]*' app/src/main/assets/app-version.json | grep -o '[0-9]*')
          curl -L -o app/src/main/assets/app.zip https://jithinrajrk147-glitch.github.io/Anxro/app-v$VERSION.zip
          echo "Bundled version $VERSION in APK"

      - name: Build Debug APK
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ANXRO-APK
          path: app/build/outputs/apk/debug/app-debug.apk
